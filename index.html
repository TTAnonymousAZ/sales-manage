<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売管理 System | T.T Anonymous AZ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, collection, query, onSnapshot, addDoc, doc, updateDoc, deleteDoc, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

        const CATEGORIES = ["刺繍", "付け襟", "クシュクシュ", "ヘアーアクセサリー"];
        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                customer: '',
                category: CATEGORIES[0],
                product: '',
                quantity: 1,
                amount: 0
            });

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const { getFirestore, collection, query, onSnapshot } = window.FirebaseSDK;
                const db = getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-manager';
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'sales'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setSales(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const analytics = useMemo(() => {
                const filtered = sales.filter(s => new Date(s.date).getFullYear() === parseInt(selectedYear));
                const monthly = Array.from({ length: 12 }, (_, i) => ({ month: `${i + 1}月`, amount: 0 }));
                const catStats = CATEGORIES.reduce((acc, cat) => { acc[cat] = { name: cat, amount: 0, quantity: 0 }; return acc; }, {});
                const custMap = {};

                filtered.forEach(s => {
                    const m = new Date(s.date).getMonth();
                    monthly[m].amount += s.amount;
                    if (catStats[s.category]) {
                        catStats[s.category].amount += s.amount;
                        catStats[s.category].quantity += s.quantity;
                    }
                    if (!custMap[s.customer]) custMap[s.customer] = { name: s.customer, quantity: 0, amount: 0 };
                    custMap[s.customer].quantity += s.quantity;
                    custMap[s.customer].amount += s.amount;
                });

                return {
                    monthly,
                    categories: Object.values(catStats),
                    customers: Object.values(custMap).sort((a, b) => b.amount - a.amount),
                    years: [...new Set(sales.map(s => new Date(s.date).getFullYear()))].sort((a, b) => b - a)
                };
            }, [sales, selectedYear]);

            const handleAddSale = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { getFirestore, collection, addDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-manager';
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), { ...formData, createdAt: new Date().toISOString() });
                    setActiveTab('history');
                    setFormData({ ...formData, customer: '', product: '', quantity: 1, amount: 0 });
                } catch (e) { console.error(e); }
            };

            if (loading) return <div className="flex h-screen items-center justify-center font-bold text-slate-400">Loading DB...</div>;

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-64 bg-slate-900 text-white p-6 flex-shrink-0">
                        <div className="mb-10">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="bg-blue-600 p-2 rounded-lg"><Icon name="database" /></div>
                                <h1 className="text-xl font-black tracking-tighter">販売管理</h1>
                            </div>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">T.T Anonymous AZ</p>
                        </div>
                        <nav className="space-y-1">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'ダッシュボード' },
                                { id: 'input', icon: 'plus-circle', label: '新規登録' },
                                { id: 'history', icon: 'history', label: '販売履歴' },
                                { id: 'customers', icon: 'users', label: '顧客管理' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === tab.id ? 'bg-blue-600' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={tab.icon} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 p-6 md:p-10 overflow-y-auto">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">ダッシュボード</h2>
                                    <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-white border rounded px-3 py-1 font-bold">
                                        {analytics.years.length > 0 ? analytics.years.map(y => <option key={y} value={y}>{y}年</option>) : <option>{new Date().getFullYear()}年</option>}
                                    </select>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                    <h3 className="font-bold mb-6 text-slate-500">月別売上推移</h3>
                                    <div className="h-[300px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={analytics.monthly}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="month" />
                                                <YAxis tickFormatter={(v) => `¥${v/1000}k`} />
                                                <Tooltip formatter={(v) => `¥${v.toLocaleString()}`} />
                                                <Bar dataKey="amount" fill="#2563eb" radius={[4, 4, 0, 0]} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border text-center">
                                        <h3 className="font-bold mb-4 text-left text-slate-500">分類別売上金額</h3>
                                        <div className="h-[250px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={analytics.categories} dataKey="amount" innerRadius={60} outerRadius={80}>
                                                        {analytics.categories.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                    </Pie>
                                                    <Tooltip formatter={(v) => `¥${v.toLocaleString()}`} />
                                                    <Legend />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                        <h3 className="font-bold mb-4 text-slate-500">分類別販売個数</h3>
                                        <div className="space-y-3">
                                            {analytics.categories.map((cat, i) => (
                                                <div key={cat.name} className="flex justify-between p-3 bg-slate-50 rounded-lg">
                                                    <span className="font-medium">{cat.name}</span>
                                                    <span className="font-bold text-blue-600">{cat.quantity} 個</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border">
                                <h2 className="text-xl font-bold mb-6">売上情報の登録</h2>
                                <form onSubmit={handleAddSale} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-400">日付</label>
                                        <input type="date" required className="w-full border p-2 rounded" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div>
                                        <div><label className="text-xs font-bold text-slate-400">カテゴリ</label>
                                        <select className="w-full border p-2 rounded" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                            {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                                        </select></div>
                                    </div>
                                    <div><label className="text-xs font-bold text-slate-400">顧客名</label>
                                    <input type="text" required className="w-full border p-2 rounded" value={formData.customer} onChange={e => setFormData({...formData, customer: e.target.value})} /></div>
                                    <div><label className="text-xs font-bold text-slate-400">商品名</label>
                                    <input type="text" required className="w-full border p-2 rounded" value={formData.product} onChange={e => setFormData({...formData, product: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-400">個数</label>
                                        <input type="number" min="1" required className="w-full border p-2 rounded" value={formData.quantity} onChange={e => setFormData({...formData, quantity: parseInt(e.target.value)})} /></div>
                                        <div><label className="text-xs font-bold text-slate-400">合計金額</label>
                                        <input type="number" min="0" required className="w-full border p-2 rounded" value={formData.amount} onChange={e => setFormData({...formData, amount: parseInt(e.target.value)})} /></div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white py-3 rounded-lg font-bold">登録する</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-slate-400 text-xs uppercase">
                                        <tr><th className="p-4">日付</th><th className="p-4">顧客名</th><th className="p-4">商品名</th><th className="p-4 text-center">個数</th><th className="p-4 text-right">金額</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {sales.length > 0 ? [...sales].sort((a,b) => b.date.localeCompare(a.date)).map(s => (
                                            <tr key={s.id} className="text-sm">
                                                <td className="p-4 text-slate-400">{s.date}</td>
                                                <td className="p-4 font-bold">{s.customer}</td>
                                                <td className="p-4">{s.product} <span className="text-[10px] block text-blue-500 uppercase">{s.category}</span></td>
                                                <td className="p-4 text-center">{s.quantity}</td>
                                                <td className="p-4 text-right font-bold">¥{s.amount.toLocaleString()}</td>
                                            </tr>
                                        )) : <tr><td colSpan="5" className="p-10 text-center text-slate-300">データなし</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'customers' && (
                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-slate-400 text-xs uppercase">
                                        <tr><th className="p-4">顧客名</th><th className="p-4 text-center">累計販売個数</th><th className="p-4 text-right">合計金額</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {analytics.customers.map(c => (
                                            <tr key={c.name} className="text-sm">
                                                <td className="p-4 font-bold">{c.name}</td>
                                                <td className="p-4 text-center">{c.quantity} 個</td>
                                                <td className="p-4 text-right font-bold text-emerald-600">¥{c.amount.toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
