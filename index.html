<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売管理 System | T.T Anonymous AZ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
    
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, collection, query, onSnapshot, addDoc, doc, updateDoc, deleteDoc, getDocs, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged };
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .active-tab { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            PieChart, Pie, Cell 
        } = Recharts;

        const CATEGORIES = ["刺繍", "付け襟", "クシュクシュ", "ヘアーアクセサリー"];
        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                customer: '',
                category: CATEGORIES[0],
                product: '',
                quantity: 1,
                amount: 0
            });

            // Firebase Initialization
            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user) return;
                const { getFirestore, collection, query, onSnapshot } = window.FirebaseSDK;
                const db = getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-manager-app';
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'sales'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSales(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Analytics logic
            const analytics = useMemo(() => {
                const filtered = sales.filter(s => new Date(s.date).getFullYear() === parseInt(selectedYear));
                
                // Monthly Data
                const monthly = Array.from({ length: 12 }, (_, i) => ({
                    month: `${i + 1}月`,
                    amount: 0
                }));
                
                // Category Data
                const catStats = CATEGORIES.reduce((acc, cat) => {
                    acc[cat] = { name: cat, amount: 0, quantity: 0 };
                    return acc;
                }, {});

                // Customer Data
                const custMap = {};

                filtered.forEach(s => {
                    const m = new Date(s.date).getMonth();
                    monthly[m].amount += s.amount;
                    
                    if (catStats[s.category]) {
                        catStats[s.category].amount += s.amount;
                        catStats[s.category].quantity += s.quantity;
                    }

                    if (!custMap[s.customer]) {
                        custMap[s.customer] = { name: s.customer, quantity: 0, amount: 0 };
                    }
                    custMap[s.customer].quantity += s.quantity;
                    custMap[s.customer].amount += s.amount;
                });

                return {
                    monthly,
                    categories: Object.values(catStats),
                    customers: Object.values(custMap).sort((a, b) => b.amount - a.amount),
                    years: [...new Set(sales.map(s => new Date(s.date).getFullYear()))].sort((a, b) => b - a)
                };
            }, [sales, selectedYear]);

            const handleAddSale = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { getFirestore, collection, addDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-manager-app';
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), {
                        ...formData,
                        createdAt: new Date().toISOString()
                    });
                    setActiveTab('history');
                    setFormData({ ...formData, customer: '', product: '', quantity: 1, amount: 0 });
                } catch (e) {
                    console.error("Error adding document: ", e);
                }
            };

            if (loading) return <div className="flex h-screen items-center justify-center">Loading Data...</div>;

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-slate-900 text-white p-6 flex-shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-blue-600 p-2 rounded-lg"><Icon name="database" /></div>
                            <h1 className="text-xl font-bold tracking-tight">販売管理</h1>
                        </div>

                        <nav className="space-y-1">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'ダッシュボード' },
                                { id: 'input', icon: 'plus-circle', label: '新規登録' },
                                { id: 'history', icon: 'history', label: '販売履歴' },
                                { id: 'customers', icon: 'users', label: '顧客管理' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === tab.id ? 'active-tab' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={tab.icon} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="mt-auto pt-20 text-[10px] text-slate-500 text-center uppercase tracking-widest">
                            Author: T.T Anonymous AZ
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-3xl font-bold tracking-tight text-slate-800">実績分析</h2>
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm font-medium text-slate-500">表示年度:</span>
                                        <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-white border rounded-lg px-3 py-1 font-bold text-blue-600 focus:outline-none shadow-sm">
                                            {analytics.years.length > 0 ? analytics.years.map(y => <option key={y} value={y}>{y}年</option>) : <option>{new Date().getFullYear()}年</option>}
                                        </select>
                                    </div>
                                </div>
                                
                                {/* Sales Chart */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="font-bold mb-6 flex items-center gap-2 text-slate-600">
                                        <Icon name="bar-chart-3" size={18} /> 月別売上推移
                                    </h3>
                                    <div className="h-[300px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={analytics.monthly}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="month" axisLine={false} tickLine={false} />
                                                <YAxis axisLine={false} tickLine={false} tickFormatter={(v) => `¥${v/1000}k`} />
                                                <Tooltip formatter={(v) => `¥${v.toLocaleString()}`} />
                                                <Bar dataKey="amount" fill="#2563eb" radius={[6, 6, 0, 0]} barSize={40} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Category Stats */}
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-600">
                                            <Icon name="pie-chart" size={18} /> 分類別売上金額
                                        </h3>
                                        <div className="h-[250px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={analytics.categories} dataKey="amount" innerRadius={60} outerRadius={80} paddingAngle={5}>
                                                        {analytics.categories.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                    </Pie>
                                                    <Tooltip formatter={(v) => `¥${v.toLocaleString()}`} />
                                                    <Legend />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                        <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-600">
                                            <Icon name="package" size={18} /> 分類別販売個数
                                        </h3>
                                        <div className="space-y-4 pt-4">
                                            {analytics.categories.map((cat, i) => (
                                                <div key={cat.name} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: COLORS[i % COLORS.length] }}></div>
                                                        <span className="font-medium">{cat.name}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-bold text-slate-800">{cat.quantity} <span className="text-xs font-normal">個</span></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="max-w-2xl mx-auto animate-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
                                    <h2 className="text-2xl font-bold mb-8 text-center text-slate-800">新規売上実績の登録</h2>
                                    <form onSubmit={handleAddSale} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase">売上日</label>
                                                <input type="date" required className="w-full px-4 py-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase">商品カテゴリ</label>
                                                <select className="w-full px-4 py-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">顧客名</label>
                                            <input type="text" required placeholder="フルネームまたは企業名" className="w-full px-4 py-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500" value={formData.customer} onChange={e => setFormData({...formData, customer: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">商品名</label>
                                            <input type="text" required placeholder="具体的な商品名" className="w-full px-4 py-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500" value={formData.product} onChange={e => setFormData({...formData, product: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase">販売個数</label>
                                                <input type="number" min="1" required className="w-full px-4 py-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500" value={formData.quantity} onChange={e => setFormData({...formData, quantity: parseInt(e.target.value)})} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase">合計金額 (¥)</label>
                                                <input type="number" min="0" required className="w-full px-4 py-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-blue-500 text-blue-600 font-bold" value={formData.amount} onChange={e => setFormData({...formData, amount: parseInt(e.target.value)})} />
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center gap-2 shadow-lg">
                                            <Icon name="check-circle-2" size={20} /> 実績をDBへ保存
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in duration-500">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-xl font-bold text-slate-800">販売履歴</h2>
                                    <div className="text-sm font-medium text-slate-500">全 {sales.length} 件のデータ</div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-100">
                                                <th className="px-6 py-4">日付</th>
                                                <th className="px-6 py-4">顧客名</th>
                                                <th className="px-6 py-4">商品名</th>
                                                <th className="px-6 py-4 text-center">個数</th>
                                                <th className="px-6 py-4 text-right">金額</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {sales.length > 0 ? [...sales].sort((a,b) => new Date(b.date) - new Date(a.date)).map((item) => (
                                                <tr key={item.id} className="hover:bg-slate-50/80 transition-colors">
                                                    <td className="px-6 py-4 text-sm font-mono text-slate-400">{item.date}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-700">{item.customer}</td>
                                                    <td className="px-6 py-4">
                                                        <div className="text-sm font-medium">{item.product}</div>
                                                        <div className="text-[10px] text-blue-500 font-bold">{item.category}</div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center font-bold">{item.quantity}</td>
                                                    <td className="px-6 py-4 text-right font-bold text-blue-600">¥{item.amount.toLocaleString()}</td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="5" className="px-6 py-10 text-center text-slate-400">データが登録されていません</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'customers' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in duration-500">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-xl font-bold text-slate-800">顧客管理</h2>
                                    <div className="text-sm font-medium text-slate-500">累計統計</div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-100">
                                                <th className="px-6 py-4">顧客名</th>
                                                <th className="px-6 py-4 text-center">累計販売個数</th>
                                                <th className="px-6 py-4 text-right">合計売上金額</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {analytics.customers.length > 0 ? analytics.customers.map((cust) => (
                                                <tr key={cust.name} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-slate-800 flex items-center gap-3">
                                                        <div className="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xs">
                                                            {cust.name.charAt(0)}
                                                        </div>
                                                        {cust.name}
                                                    </td>
                                                    <td className="px-6 py-4 text-center font-medium">{cust.quantity} 個</td>
                                                    <td className="px-6 py-4 text-right font-bold text-emerald-600">¥{cust.amount.toLocaleString()}</td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="3" className="px-6 py-10 text-center text-slate-400">取引実績のある顧客がいません</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
