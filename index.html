<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売管理システム - セキュアログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen">

    <!-- ログイン / 初期設定 画面 -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20">
            <div class="text-center mb-8">
                <div id="status-icon" class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                    <i data-lucide="shield-lock" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">販売管理システム</h1>
                <p id="status-msg" class="text-gray-500 mt-2 text-sm text-balance">認証情報を入力してください</p>
            </div>

            <div class="space-y-4">
                <div id="setup-key-area" class="hidden animate-pulse">
                    <label class="block text-[10px] font-bold text-red-500 uppercase tracking-widest mb-1">マスター・セットアップキー</label>
                    <input type="password" id="setup-key" placeholder="管理者のみが知るキーを入力" class="w-full px-4 py-3 border-2 border-red-100 bg-red-50 rounded-xl focus:ring-2 focus:ring-red-500 focus:outline-none transition-all">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">ユーザーID</label>
                    <input type="text" id="user-id" placeholder="IDを入力" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">パスワード</label>
                    <input type="password" id="user-pw" placeholder="パスワードを入力" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                
                <div id="login-error" class="hidden flex items-start gap-2 text-red-500 text-xs bg-red-50 p-3 rounded-lg border border-red-100">
                    <i data-lucide="info" class="w-4 h-4 shrink-0"></i>
                    <span id="error-text"></span>
                </div>

                <button id="login-btn" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    <span>ログイン</span>
                </button>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-[10px] text-gray-400 font-medium">Author: T.T Anonymous AZ</p>
            </div>
        </div>
    </div>

    <!-- メイン画面 (ログイン後) -->
    <div id="main-app" class="hidden flex h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b border-gray-100 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="package" class="w-5 h-5"></i>
                </div>
                <span class="font-bold text-lg text-gray-800">販売管理</span>
            </div>
            <nav class="p-4 flex-1 space-y-1">
                <div class="px-4 py-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Menu</div>
                <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-600 font-bold">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> ダッシュボード
                </button>
            </nav>
            <div class="p-4 border-t border-gray-100 flex items-center justify-between">
                <span id="display-user-id" class="text-xs font-bold text-gray-500">---</span>
                <button onclick="location.reload()" class="p-2 text-gray-400 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </aside>
        <main class="flex-1 bg-slate-50 p-8">
            <header class="mb-8">
                <h2 class="text-2xl font-black text-gray-800">DASHBOARD</h2>
                <p class="text-sm text-gray-500">システムは正常に稼働しています</p>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase">Total Sales</p>
                    <p class="text-2xl font-black mt-1">¥0</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // ★★★ 開発者のみが知るマスターキー ★★★
        const MASTER_SETUP_KEY = "AZ-2024-INIT"; 

        let isFirstTime = false;
        let currentUser = null;

        // 初期認証と状態チェック
        const init = async () => {
            try {
                // Rule 3: Auth Before Queries - 最初に認証を完了させる
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 認証完了後に初期状態を確認
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        await checkInitialState();
                    }
                });
            } catch (e) {
                console.error("Initialization error:", e);
                showError("初期化エラーが発生しました。");
            }
        };

        const checkInitialState = async () => {
            if (!auth.currentUser) return;

            try {
                const metaRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'status');
                const metaSnap = await getDoc(metaRef);
                
                if (!metaSnap.exists()) {
                    isFirstTime = true;
                    document.getElementById('setup-key-area').classList.remove('hidden');
                    document.getElementById('status-msg').innerText = "初期セットアップが必要です。マスターキーを入力して管理者を作成してください。";
                    document.getElementById('status-icon').classList.replace('bg-blue-100', 'bg-red-100');
                    document.getElementById('status-icon').classList.replace('text-blue-600', 'text-red-600');
                    document.getElementById('login-btn').querySelector('span').innerText = "管理者アカウントを作成";
                }
            } catch (e) {
                console.error("Check state error:", e);
                // 権限エラーが出る場合はここで表示
                if (e.code === 'permission-denied') {
                    showError("データベースへのアクセス権限がありません。");
                }
            }
            if (window.lucide) window.lucide.createIcons();
        };

        const handleAuth = async () => {
            // セキュリティルール遵守のため、ボタン押下時にも認証状態を確認
            if (!auth.currentUser) {
                showError("認証の準備ができていません。しばらく待ってから再試行してください。");
                return;
            }

            const id = document.getElementById('user-id').value.trim();
            const pw = document.getElementById('user-pw').value.trim();
            const sKey = document.getElementById('setup-key').value.trim();
            const errDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errDiv.classList.add('hidden');

            if (isFirstTime) {
                if (sKey !== MASTER_SETUP_KEY) {
                    showError("マスターキーが正しくありません。");
                    return;
                }
                if (id.length < 3 || pw.length < 4) {
                    showError("IDは3文字以上、PWは4文字以上で設定してください。");
                    return;
                }

                btn.disabled = true;
                try {
                    // 管理者作成
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'auth', id), { 
                        password: pw, 
                        role: 'admin',
                        createdAt: new Date() 
                    });
                    // セットアップ完了フラグ
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'status'), { 
                        initialized: true,
                        adminId: id
                    });
                    enterApp(id);
                } catch (e) {
                    showError("登録エラー: " + e.message);
                    btn.disabled = false;
                }
            } else {
                btn.disabled = true;
                try {
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'auth', id));
                    if (snap.exists() && snap.data().password === pw) {
                        enterApp(id);
                    } else {
                        showError("IDまたはパスワードが正しくありません。");
                        btn.disabled = false;
                    }
                } catch (e) {
                    showError("ログインエラーが発生しました。");
                    btn.disabled = false;
                }
            }
        };

        const showError = (msg) => {
            const errDiv = document.getElementById('login-error');
            const errText = document.getElementById('error-text');
            if (errDiv && errText) {
                errText.innerText = msg;
                errDiv.classList.remove('hidden');
            }
        };

        const enterApp = (id) => {
            document.getElementById('display-user-id').innerText = id;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };

        document.getElementById('login-btn').addEventListener('click', handleAuth);
        
        // 起動
        init();
    </script>
</body>
</html>
