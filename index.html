<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>販売管理 - T.T Anonymous AZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 bg-slate-950 text-slate-400 flex-shrink-0 hidden xl:flex flex-col p-6 border-r border-slate-800">
        <div class="flex items-center gap-3 px-2 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-xl">
                <i class="fas fa-cube"></i>
            </div>
            <h1 class="text-white font-extrabold text-xl tracking-tight">販売管理 Pro</h1>
        </div>
        
        <nav class="flex-1 space-y-2">
            <div class="text-[10px] font-bold text-slate-600 uppercase tracking-widest px-4 mb-2">Main Menu</div>
            <a href="#" class="flex items-center gap-3 px-4 py-3.5 bg-blue-600/10 text-blue-400 rounded-2xl border border-blue-600/20 font-semibold transition-all">
                <i class="fas fa-grid-2-horizontal"></i> ダッシュボード
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3.5 hover:bg-slate-900 hover:text-white rounded-2xl transition-all">
                <i class="fas fa-box"></i> 在庫管理
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3.5 hover:bg-slate-900 hover:text-white rounded-2xl transition-all">
                <i class="fas fa-users"></i> 顧客マスタ
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3.5 hover:bg-slate-900 hover:text-white rounded-2xl transition-all">
                <i class="fas fa-file-invoice"></i> 受注伝票
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-900">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Primary Author</p>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-xs font-bold shadow-lg">AZ</div>
                    <p class="text-sm font-bold text-slate-200 truncate">T.T Anonymous AZ</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Content Area -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Top Nav -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-50">
            <div>
                <h2 class="text-xl font-extrabold text-slate-800">Dashboard Overview</h2>
                <p class="text-xs text-slate-400">リアルタイムの販売状況を把握します</p>
            </div>
            <div id="connectionStatus" class="flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-full text-xs font-bold text-slate-500 transition-all">
                <span class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></span>
                Nero Initializing...
            </div>
        </header>

        <main class="p-6 lg:p-10 space-y-8 max-w-[1600px] mx-auto w-full">
            <!-- Stats Grid -->
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Skeletons -->
                <div class="h-32 rounded-3xl skeleton"></div>
                <div class="h-32 rounded-3xl skeleton"></div>
                <div class="h-32 rounded-3xl skeleton"></div>
                <div class="h-32 rounded-3xl skeleton"></div>
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-8 rounded-[32px] custom-shadow border border-slate-100">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-lg font-bold flex items-center gap-2">
                            <i class="fas fa-chart-line text-blue-600"></i> 売上トレンド分析
                        </h3>
                        <select class="bg-slate-50 border-none text-xs font-bold px-4 py-2 rounded-xl focus:ring-0">
                            <option>過去6ヶ月</option>
                        </select>
                    </div>
                    <div class="h-[400px]">
                        <canvas id="salesTrendChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[32px] custom-shadow border border-slate-100 flex flex-col">
                    <h3 class="text-lg font-bold mb-10 flex items-center gap-2">
                        <i class="fas fa-pie-chart text-purple-600"></i> カテゴリ別比率
                    </h3>
                    <div class="flex-1 relative flex items-center justify-center">
                        <canvas id="categoryDonutChart"></canvas>
                    </div>
                    <div id="categoryLegend" class="mt-8 space-y-3">
                        <!-- Legend items from Nero -->
                    </div>
                </div>
            </div>

            <!-- Recent Data Table -->
            <div class="bg-white rounded-[32px] custom-shadow border border-slate-100 overflow-hidden">
                <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <h3 class="text-lg font-bold">最新の受注履歴</h3>
                    <div class="flex gap-2">
                        <button class="p-2 hover:bg-slate-100 rounded-lg transition-colors"><i class="fas fa-search text-slate-400"></i></button>
                        <button class="p-2 hover:bg-slate-100 rounded-lg transition-colors"><i class="fas fa-filter text-slate-400"></i></button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">
                                <th class="px-8 py-5">取引ID</th>
                                <th class="px-8 py-5">商品カテゴリ</th>
                                <th class="px-8 py-5">ステータス</th>
                                <th class="px-8 py-5">受注日</th>
                                <th class="px-8 py-5 text-right">金額</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsBody" class="divide-y divide-slate-100">
                            <tr><td colspan="5" class="px-8 py-20 text-center text-slate-400 italic">APIからデータを取得しています...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- User Feedback Modal (Hidden by default) -->
    <div id="errorModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden items-center justify-center">
        <div class="bg-white p-8 rounded-[32px] max-w-sm w-full shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h4 class="text-xl font-bold mb-2">接続エラー</h4>
            <p id="errorMessage" class="text-slate-500 text-sm mb-6">データの取得に失敗しました。再試行してください。</p>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all">リロード</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // Runtime provides this
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-mgmt-system';

        const NERO_PROMPT = `
        You are a data generation backend for a Sales Management System.
        Author: T.T Anonymous AZ.
        Generate structured JSON for a business dashboard.
        Include:
        1. "summary": Array of 4 objects { label: string, value: string, change: string, isUp: boolean, icon: string }
        2. "trend": { labels: string[], data: number[] } - 6 months of sales trend.
        3. "categories": Array of 4 objects { name: string, percent: number, color: string }
        4. "recent": Array of 6 objects { id: string, category: string, status: string, date: string, amount: string }
        `;

        async function fetchDashboardData(retries = 5, delay = 1000) {
            const statusEl = document.getElementById('connectionStatus');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Generate current sales dashboard data based on the defined system prompt." }] }],
                        systemInstruction: { parts: [{ text: NERO_PROMPT }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const result = await response.json();
                const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) throw new Error('Empty response');

                const data = JSON.parse(rawText);
                renderDashboard(data);

                // Success Status
                statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span> Nero Connected';
                statusEl.className = "flex items-center gap-2 px-4 py-2 bg-emerald-50 rounded-full text-xs font-bold text-emerald-600 border border-emerald-100 transition-all";

            } catch (error) {
                if (retries > 0) {
                    setTimeout(() => fetchDashboardData(retries - 1, delay * 2), delay);
                } else {
                    document.getElementById('errorModal').classList.replace('hidden', 'flex');
                    statusEl.innerText = "Connection Failed";
                }
            }
        }

        function renderDashboard(data) {
            // Render Stats
            const statsContainer = document.getElementById('statsGrid');
            statsContainer.innerHTML = data.summary.map(item => `
                <div class="bg-white p-6 rounded-[28px] custom-shadow border border-slate-100 group hover:border-blue-200 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
                            <i class="fas ${item.icon}"></i>
                        </div>
                        <span class="text-[10px] font-extrabold px-2 py-1 rounded-lg ${item.isUp ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                            ${item.isUp ? '↑' : '↓'} ${item.change}
                        </span>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">${item.label}</p>
                        <p class="text-2xl font-black text-slate-800 tracking-tight">${item.value}</p>
                    </div>
                </div>
            `).join('');

            // Sales Trend Chart
            const ctxTrend = document.getElementById('salesTrendChart').getContext('2d');
            const gradient = ctxTrend.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.15)');
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0.0)');

            new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: data.trend.labels,
                    datasets: [{
                        label: '売上高',
                        data: data.trend.data,
                        borderColor: '#2563eb',
                        borderWidth: 4,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.45,
                        pointRadius: 0,
                        pointHoverRadius: 8,
                        pointHoverBackgroundColor: '#2563eb',
                        pointHoverBorderColor: '#ffffff',
                        pointHoverBorderWidth: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { border: { display: false }, grid: { color: '#f8fafc' }, ticks: { font: { weight: 'bold', size: 10 }, color: '#94a3b8' } },
                        x: { border: { display: false }, grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 }, color: '#94a3b8' } }
                    }
                }
            });

            // Donut Chart
            const ctxDonut = document.getElementById('categoryDonutChart').getContext('2d');
            new Chart(ctxDonut, {
                type: 'doughnut',
                data: {
                    labels: data.categories.map(c => c.name),
                    datasets: [{
                        data: data.categories.map(c => c.percent),
                        backgroundColor: data.categories.map(c => c.color),
                        hoverOffset: 15,
                        borderWidth: 8,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '82%',
                    plugins: { legend: { display: false } }
                }
            });

            // Legend
            const legendContainer = document.getElementById('categoryLegend');
            legendContainer.innerHTML = data.categories.map(c => `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="w-2.5 h-2.5 rounded-full" style="background-color: ${c.color}"></span>
                        <span class="text-sm font-bold text-slate-600">${c.name}</span>
                    </div>
                    <span class="text-sm font-black text-slate-900">${c.percent}%</span>
                </div>
            `).join('');

            // Table
            const tableBody = document.getElementById('transactionsBody');
            tableBody.innerHTML = data.recent.map(row => `
                <tr class="hover:bg-slate-50/80 transition-all group">
                    <td class="px-8 py-5 font-bold text-slate-900">${row.id}</td>
                    <td class="px-8 py-5 text-sm font-medium text-slate-500">${row.category}</td>
                    <td class="px-8 py-5">
                        <span class="px-3 py-1 text-[10px] font-black rounded-full border border-slate-100 bg-white custom-shadow uppercase">
                            ${row.status}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-sm text-slate-400 font-medium">${row.date}</td>
                    <td class="px-8 py-5 text-right font-black text-slate-800">${row.amount}</td>
                </tr>
            `).join('');
        }

        window.onload = () => {
            fetchDashboardData();
        };
    </script>
</body>
</html>
